[workspace]
authors = ["Atle Rimehaug <atle.rimehaug@gmail.com"]
channels = ["conda-forge"]
name = "ni-day3"
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[dependencies]
python = "3.13.*"
ipykernel = ">=7.2.0,<8"
pip = ">=26.1.2,<27"

[pypi-dependencies]
numpy = ">=2.4.6,<3"
xarray = ">=2026.4.0,<2027"
pip = ">=26.1.1,<27"
quantities = ">=0.16.4,<0.17"
scipy = ">=1.17.1,<2"
matplotlib = ">=3.10.9,<4"
pynwb = ">=3.1.3,<4"
pyocclient = ">=0.6,<0.7"
tqdm = ">=4.68.2,<5"

#### Jupyter Kernel

[tasks]
install-kernel = "python -m ipykernel install --user --name ni-d3"

### Jupyter Lab Environment (pixi run jupyter) #############

[feature.jupyter.dependencies]
python = "3.13.*"

[feature.jupyter.pypi-dependencies]
jupyterlab = ">=4"

[feature.jupyter.tasks]
jupyter = "jupyter lab"

[environments.jupyter]
features = ["jupyter"]
no-default-feature = true

################################################

